buildscript {
    repositories {
        mavenCentral()
    }
    configurations.classpath {
        resolutionStrategy.force(
                'org.ow2.asm:asm:9.6',
                'org.ow2.asm:asm-commons:9.6',
                'org.ow2.asm:asm-tree:9.6',
                'org.ow2.asm:asm-analysis:9.6',
                'org.ow2.asm:asm-util:9.6'
        )
    }
}

plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'com.zxcmc.chorusfix'
version = '0.1.1'
description = 'Restores vanilla chorus plant updates when Paper disables them for custom block plugins.'

base {
    archivesName = 'Chorusfix'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
    maven {
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
}

configurations {
    googleJavaFormat
}

configurations.configureEach {
    if (canBeResolved) {
        attributes.attribute(org.gradle.api.attributes.java.TargetJvmVersion.TARGET_JVM_VERSION_ATTRIBUTE, 25)
    }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:26.1.2.build.59-stable'
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'io.papermc.paper:paper-api:26.1.2.build.59-stable'
    googleJavaFormat 'com.google.googlejavaformat:google-java-format:1.35.0'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
    options.compilerArgs += [
        "-Xlint:deprecation",
        "-Xlint:unchecked"
    ]
}

tasks.register('googleJavaFormat', JavaExec) {
    group = 'formatting'
    description = 'Formats Java sources using google-java-format.'
    classpath = configurations.googleJavaFormat
    mainClass = 'com.google.googlejavaformat.java.Main'
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
    jvmArgs(
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED'
    )
    args '--replace'
    args fileTree('src') {
        include 'main/java/**/*.java'
        include 'test/java/**/*.java'
    }.files
}

tasks.register('googleJavaFormatCheck', JavaExec) {
    group = 'verification'
    description = 'Checks Java source formatting using google-java-format without rewriting files.'
    classpath = configurations.googleJavaFormat
    mainClass = 'com.google.googlejavaformat.java.Main'
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
    jvmArgs(
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED'
    )
    args '--dry-run'
    args '--set-exit-if-changed'
    args fileTree('src') {
        include 'main/java/**/*.java'
        include 'test/java/**/*.java'
    }.files
}

tasks.withType(JavaCompile).configureEach {
    dependsOn tasks.named('googleJavaFormat')
}

tasks.named('googleJavaFormatCheck') {
    mustRunAfter tasks.named('googleJavaFormat')
}

tasks.named('check') {
    dependsOn tasks.named('googleJavaFormatCheck')
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.named('shadowJar') {
    archiveClassifier = ''
    includeEmptyDirs = false
    configurations = [project.configurations.runtimeClasspath]
}

tasks.named('jar') {
    enabled = false
}

tasks.named('build') {
    dependsOn tasks.named('shadowJar')
}

tasks.processResources {
    includeEmptyDirs = false
    filteringCharset = 'UTF-8'
    inputs.property('version', project.version)
    inputs.property('description', project.description)
    filesMatching(['plugin.yml', 'paper-plugin.yml']) {
        expand(
            version: project.version,
            description: project.description
        )
    }
}
